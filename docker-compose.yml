services:
  # Service 1 : Le serveur MCP pour l'API data.inclusion
  mcp_server:
    build: .
    command: python -m src.mcp_server.server
    env_file:
      - .env
    ports:
      - "8000:8000" # Mappe le port 8000 de l'hôte au conteneur
    volumes:
      - ./src:/app/src # Synchronise le code pour le développement
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s  # Augmenté de 10s à 30s pour laisser plus de temps au serveur
      timeout: 5s
      retries: 5
      start_period: 60s  # Augmenté de 30s à 60s pour un démarrage plus robuste
    networks:
      - app-network

  # Service 2 : Le serveur Agent qui communique avec le frontend et le MCP
  agent_server:
    build: .
    command: python main.py
    env_file:
      - .env
    ports:
      - "8001:8001" # Mappe le port 8001 de l'hôte au conteneur
    volumes:
      - ./src:/app/src
    restart: on-failure  # Redémarre automatiquement en cas d'échec
    environment:
      - MCP_CONNECTION_RETRY_DELAY=5  # Délai entre les tentatives de connexion MCP
    networks:
      - app-network
    depends_on:
      mcp_server:
        condition: service_healthy

  # Service 3 : Interface Gradio pour l'interaction utilisateur
  gradio_interface:
    build: .
    command: python gradio_app.py --debug --host 0.0.0.0 --port 7860 --agent-url http://agent_server:8001
    env_file:
      - .env
    ports:
      - "7860:7860" # Mappe le port 7860 de l'hôte au conteneur
    volumes:
      - ./src:/app/src
      - ./gradio_app.py:/app/gradio_app.py
    restart: on-failure
    environment:
      - PYTHONPATH=/app  # S'assurer que le module src est trouvé
    networks:
      - app-network
    depends_on:
      agent_server:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

networks:
  app-network:
    driver: bridge 